<html>
  <head>
    <title>Phat Rats for Emotional Support in these Trying Times</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iceberg&family=Kablammo&family=Playwrite+US+Modern:wght@100..400&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>

      body {
  font-family: 'Kablammo', sans-serif;
  font-size: 3.1rem; /* Adjust size as needed */
  /* Initially set the font variation setting using the custom property */
  
}

/* Change the value of the custom property on a pseudo-class (e.g., hover) 
   or with keyframes to trigger the animation */
body:hover {
  --morf: 60; /* Morph to the 'Eek' style on hover */
}
      h1 {
  /* Dark Purple-Blue Font Color */
  color: #1E174B; 
  
  /* Thin Fuchsia Outline (1px) */
  -webkit-text-stroke: .5px #8B008B;
  
  /* Optional: Fallback for older browsers using text-shadow */
  
;
}


      img {
  max-width: 100%; /* Ensures the image doesn't exceed its container's width, scaling down if necessary */
  height: auto;    /* Automatically adjusts the height to maintain the image's original aspect ratio */
  display: block;  /* Helps with centering and layout control */
  margin: auto;    /* Centers the image horizontally if it's smaller than the container width */
}


          .morphing-text {
      font-family: 'Kablammo', sans-serif;
      
      text-align: center;
      /* Apply the custom property to the font variation setting */
  
      /* Animate the custom property with keyframes */
      animation: morph-dance .5s infinite alternate forwards; 
    }

  @keyframes morph-dance {
    0% { 
      font-variation-settings: "MORF" 0; 
    }
    33% { 
      font-variation-settings: "MORF" 20; 
    }
    66% { 
      font-variation-settings: "MORF" 40; 
    }
    100% { 
      font-variation-settings: "MORF" 60; 
    }

  }
        
      
    </style>
  </head>
  <body>
    <img id="here" src="phattie.png"></img>
    <h1 id="h" class="morphing-text">Check yourself out, cutie</h1>
    
  <script>
    // 1. Array of images
    const images = ["phattie.png", "umbrella.png", "cheese.png", "dance.png", "bath.png", "frolic.png"];
    const headers = ["Check yourself out, cutie!", "It's a fancy umbrella kind of day.", "You've had a long day. Have some cheese and tell me about it.", "Dance!", "When was the last time you had a nice bath? Do something to bring yourself comfort today.", "Don't forget to frolic!"];

    // 2. Get the current hour
    const currentHour = new Date().getSeconds();

    // 3. Calculate index (hour mod 3)
    const index = currentHour % images.length;

    // 4. Set the image source
    document.getElementById("here").src = images[index];
    document.getElementById("h").textContent = headers[index];
  </script>
    </body>
</html>
